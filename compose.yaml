services:
  db:
    image: postgres:16
    container_name: soul_link_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soul_link
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: soul_link-backend
    depends_on:
      - db
    ports:
      - "4000:4000"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: soul_link
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data: